server:
  port: 8082 # 与 api 的 8081 区分开

spring:
  datasource:
    # 假设使用以下配置连上本地 MySQL
    url: jdbc:mysql://127.0.0.1:3306/ai_center?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启控制台打印 SQL
